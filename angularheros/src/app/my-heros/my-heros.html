<h2>My Heroes</h2>

<ul class="heroes">
  <li *ngFor="let hero of myheroes">
    <button type="button" on-click="onSelect(hero)">
    <span class="badge">{{ hero.id }} -</span>
    <span class="name">{{ hero.name }}</span>
    </button>
  </li>
</ul>

<app-hero-details [myHero]="selectedHero"></app-hero-details>
